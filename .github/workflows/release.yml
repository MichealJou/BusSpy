name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - name: Windows x64
            platform: windows-latest
            args: ""
            rust-targets: ""
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.event.release.tag_name || inputs.version || github.ref_name }}
          releaseName: BusSpy ${{ github.event.release.tag_name || inputs.version || github.ref_name }}
          releaseBody: |
            BusSpy ${{ github.event.release.tag_name || inputs.version || github.ref_name }}

            下载对应系统的安装包：

            - Windows：`.exe` / `.msi`
            - macOS：`.dmg`
            - Linux：`.AppImage` / `.deb` / `.rpm`

            未签名版本首次运行可能需要手动允许，Linux 串口访问可能需要加入 `dialout` 用户组。
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: BusSpy-[version]-[platform]-[arch]-[bundle][setup][ext]
